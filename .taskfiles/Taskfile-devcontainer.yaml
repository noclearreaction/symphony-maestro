# .taskfiles/Taskfile-devcontainer.yaml
# Devcontainer health checks and utility tasks.
# Included by the root Taskfile.yaml under the devcontainer: namespace.
version: "3"

tasks:
  default:
    desc: "Show devcontainer tasks"
    summary: |
      Usage: task -g devcontainer:<task>

      Tasks:
        doctor    Verify all critical tools are present and wired correctly

      Run 'task -g --summary devcontainer:<task>' for detailed usage.
    cmds:
      - task --list --taskfile {{.TASKFILE}}
    silent: true

  list:
    desc: "List devcontainer tasks"
    summary: |
      Usage: task -g devcontainer:list

      Prints all tasks defined in the devcontainer Taskfile.
    cmds:
      - task --list --taskfile {{.TASKFILE}}

  doctor:
    desc: "Verify all critical tools are correctly wired in the devcontainer"
    summary: |
      Usage: task -g devcontainer:doctor

      Checks each required tool in turn and prints its version:
        go, deno, task, gh, docker

      Exits non-zero on first failure so the broken tool is immediately visible.
    cmds:
      - echo "--- go ---"
      - go version
      - echo "--- deno ---"
      - deno --version
      - echo "--- task ---"
      - task --version
      - echo "--- gh ---"
      - gh --version
      - echo "--- docker ---"
      - docker info >/dev/null
      - echo "All tools OK"
    # Exit non-zero on first failure so the problem is immediately visible
