# Taskfile.yaml — root task runner for symphony-maestro
version: "3"

includes:
  devcontainer:
    taskfile: .taskfiles/Taskfile-devcontainer.yaml
    dir: "{{.TASKFILE_DIR}}"
  node:
    taskfile: .taskfiles/Taskfile-node.yaml
    dir: "{{.TASKFILE_DIR}}"

tasks:
  usage:
    desc: "Show available tasks"
    aliases: [default, help]
    summary: |
      Usage: task -g [<namespace>:]<task> [-- <args>]

      Namespaces:
        devcontainer    Health checks and devcontainer utilities
        node            Node package and image management

      Run 'task -g <namespace>:usage' for namespace-scoped help.
      Run 'task -g --summary <task>' for detailed usage of a specific task.
    cmds:
      - task --list
    silent: true

  list:
    desc: "List all available tasks"
    summary: |
      Usage: task -g list

      Prints all available tasks across all namespaces.
    cmds:
      - task --list

  health:
    desc: "Alias for devcontainer:doctor — check all tools are wired correctly"
    summary: |
      Usage: task -g health

      Runs devcontainer:doctor. Checks that all required tools (go, deno,
      task, gh, docker) are present and executable. Exits non-zero on first
      failure.
    cmds:
      - task: devcontainer:doctor
