# =============================================================================
# PROJECT NAME — must match the name the devcontainer CLI derives so that
# `docker compose` commands run inside the container share the same volumes.
# The devcontainer CLI uses the config directory name (.devcontainer →
# devcontainer) as the project name when no explicit name is set; we mirror
# that here so the two are always in sync.
# =============================================================================
name: symphony-maestro_devcontainer

# =============================================================================
# VERSION CONFIGURATION — UPDATE THESE TO UPGRADE TOOLS
# Renovate manages this file via the dockerfile datasource.
# =============================================================================

x-runtime: &runtime
  context: .
  dockerfile: Dockerfile

services:
  symphony-studio:
    build:
      <<: [*runtime]
      target: final
    image: symphony-studio
    command: sleep infinity
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-..}:/workspace:cached

  node-apps:
    build:
      <<: [*runtime]
      target: node-apps
    image: symphony-studio-node-apps
    command: "true"

volumes:
  node-modules:
  corepack-cache:
