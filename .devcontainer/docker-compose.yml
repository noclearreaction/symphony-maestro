# =============================================================================
# VERSION CONFIGURATION — UPDATE THESE TO UPGRADE TOOLS
# Renovate manages this file via the dockerfile datasource.
# =============================================================================
x-versions: &versions
  args:
    # renovate: datasource=golang-version depName=go
    GO_VERSION: "1.26.4"
    # renovate: datasource=github-releases depName=denoland/deno
    DENO_VERSION: "2.8.2"
    # renovate: datasource=github-releases depName=go-task/task
    TASK_VERSION: "3.51.1"
    # renovate: datasource=node depName=node
    NODE_VERSION: "22.16.0"
    # renovate: datasource=npm depName=pnpm
    PNPM_VERSION: "10.12.1"

x-runtime: &runtime
  context: .
  dockerfile: Dockerfile

services:
  symphony-studio:
    build:
      <<: [*runtime, *versions]
      target: final
    image: symphony-studio
    command: sleep infinity
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER:-..}:/workspace:cached
      - node-modules:/opt/node

  node-builder:
    build:
      <<: [*runtime, *versions]
      target: node-builder
    image: symphony-studio-node-builder
    command: "true"

volumes:
  node-modules:
    name: symphony-studio-node-modules
