# .devcontainer/node/Taskfile.yaml
# Node package management tasks — all mutation runs inside symphony-studio-node-builder via DooD.
# See .devcontainer/node/package.json for the managed package list.
# Use task node:package:* and task node:trust:* — do not run pnpm directly.
version: "3"

vars:
  NODE_DIR: "{{.ROOT_DIR}}/.devcontainer/node"
  COMPOSE_FILE: "{{.ROOT_DIR}}/.devcontainer/docker-compose.yml"
  COMPOSE_RUN: docker compose -f {{.ROOT_DIR}}/.devcontainer/docker-compose.yml run --rm
  COMPOSE_DIR: "{{.ROOT_DIR}}/.devcontainer"
  NB_RUN: "docker compose run -v /home/tunnel49/src/symphony-maestro/.devcontainer/node:/opt/node --rm node-builder"
  NB2_RUN: "docker compose run --rm node-builder"


tasks:
  sample:
    dir: >-
      {{ .COMPOSE_DIR }}
    cmds:
      - docker compose build node-builder
      - echo "Running tests in symphony-studio-node-builder..."
      - |
          {{.NB_RUN}} bash -eu <<'BASH'
            > package2.json jq -n '{"private":true,"type":"module"}' && \
            pnpm --allow-build=opencode-ai add --save-exact opencode-ai@1.17.4
          BASH
      - ls -l /opt/node_modules/.bin
  sample2:
    dir: >-
      {{ .COMPOSE_DIR }}
    cmds:
      - docker compose build node-builder
      - echo "Running tests in symphony-studio-node-builder..."
      - |
          {{.NB2_RUN}} bash -eu <<'BASH'
            > package.json jq -n '{"private":true,"type":"module"}' && \
            pnpm --allow-build=opencode-ai add --save-exact opencode-ai@1.17.4
          BASH
      - ls -l /opt/node_modules/.bin

  build:
    desc: "Install packages from the committed lockfile into the node-modules volume"
    cmds:
      - |
        {{.COMPOSE_RUN}} -w /src node-builder pnpm install --frozen-lockfile

  package:add:
    desc: "Add a package: task node:package:add -- <name>@<version>"
    cmds:
      - |
        {{.COMPOSE_RUN}} -w /src node-builder pnpm add {{.CLI_ARGS}}

  package:update:
    desc: "Update a package: task node:package:update -- <name> <version>"
    cmds:
      - |
        {{.COMPOSE_RUN}} -w /src node-builder pnpm update {{.CLI_ARGS}}

  package:rm:
    desc: "Remove a package: task node:package:rm -- <name>"
    cmds:
      - |
        {{.COMPOSE_RUN}} -w /src node-builder pnpm remove {{.CLI_ARGS}}

  package:list:
    desc: "List direct dependencies from package.json (no container)"
    cmds:
      - cat "{{.NODE_DIR}}/package.json"

  package:audit:
    desc: "Audit dependencies for vulnerabilities"
    cmds:
      - |
        {{.COMPOSE_RUN}} -w /src node-builder pnpm audit

  package:prune:
    desc: "No-op: pnpm store is ephemeral per build (no store volume)"
    cmds:
      - echo 'pnpm store is ephemeral; nothing to prune'

  trust:add:
    desc: "Allow build scripts for a package: task node:trust:add -- <name>"
    cmds:
      - |
        pkg={{.CLI_ARGS}}
        file="{{.NODE_DIR}}/pnpm-workspace.yaml"
        if grep -q "^  ${pkg}:" "$file"; then
          echo "already trusted: $pkg"
        else
          sed -i "s/^allowBuilds:.*/allowBuilds:/" "$file"
          sed -i "s/^allowBuilds:/allowBuilds:\n  ${pkg}: true/" "$file"
          echo "trusted: $pkg"
        fi

  trust:rm:
    desc: "Remove build script trust for a package: task node:trust:rm -- <name>"
    cmds:
      - |
        pkg={{.CLI_ARGS}}
        sed -i "/^  ${pkg}: true/d" "{{.NODE_DIR}}/pnpm-workspace.yaml"
        echo "removed trust: $pkg"

  trust:list:
    desc: "List trusted packages from pnpm-workspace.yaml (no container)"
    cmds:
      - |
        grep -A 100 "^allowBuilds:" "{{.NODE_DIR}}/pnpm-workspace.yaml" | tail -n +2 | grep "^  " || echo "(none)"

  trust:verify:
    desc: "Check for transitive deps with build scripts not in allowBuilds"
    cmds:
      - |
        {{.COMPOSE_RUN}} -w /src node-builder pnpm install --frozen-lockfile --dry-run
